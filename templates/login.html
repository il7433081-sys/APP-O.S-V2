<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Ordem de Serviço Digital</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --os-bg: #141414;
            --os-surface: #1e1e1e;
            --os-surface-2: #262626;
            --os-border: #3a3a3a;
            --os-accent: #1f6aa5;
            --os-text: #e8e8e8;
            --os-muted: #9ca3af;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--os-bg);
            color: var(--os-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            width: min(420px, 100%);
            background: var(--os-surface);
            border: 1px solid var(--os-border);
            border-radius: 0.75rem;
            padding: 1.75rem;
        }
        .form-control {
            background: var(--os-surface-2);
            border-color: var(--os-border);
            color: var(--os-text);
            min-height: 3rem;
        }
        .form-control:focus {
            background: var(--os-surface-2);
            border-color: var(--os-accent);
            color: var(--os-text);
            box-shadow: 0 0 0 0.2rem rgba(31, 106, 165, 0.25);
        }
        .btn-primary {
            background: var(--os-accent);
            border-color: var(--os-accent);
            min-height: 3rem;
        }
        .nome-preview {
            min-height: 1.25rem;
            font-size: 0.85rem;
            color: var(--os-muted);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-clipboard2-check display-5 text-info"></i>
            <h1 class="h4 mt-2 mb-1">Ordem de Serviço Digital</h1>
            <p class="text-muted small mb-0">Faça login para continuar</p>
        </div>

        <form id="form-login" novalidate>
            <input type="hidden" id="proximo" value="{{ proximo }}">
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="usuario" name="usuario"
                       autocomplete="username" required autofocus>
                <div id="nome-preview" class="nome-preview mt-1"></div>
            </div>
            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha"
                       autocomplete="current-password" required>
            </div>
            <div id="login-feedback" class="small mb-3" role="alert"></div>
            <button type="submit" class="btn btn-primary w-100" id="btn-entrar">
                <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
            </button>
        </form>

        <p class="small text-muted text-center mt-3 mb-0">v{{ app_version }}</p>
    </div>

    <script>
        (function () {
            "use strict";
            const form = document.getElementById("form-login");
            const campoUsuario = document.getElementById("usuario");
            const campoSenha = document.getElementById("senha");
            const feedback = document.getElementById("login-feedback");
            const nomePreview = document.getElementById("nome-preview");
            const proximo = document.getElementById("proximo").value || "/";
            let timerPreview = null;

            function definirFeedback(texto, tipo) {
                feedback.textContent = texto || "";
                feedback.className = "small mb-3";
                if (tipo === "erro") feedback.classList.add("text-danger");
                else if (tipo === "ok") feedback.classList.add("text-success");
                else feedback.classList.add("text-muted");
            }

            async function atualizarNome() {
                const login = campoUsuario.value.trim();
                if (!login) {
                    nomePreview.textContent = "";
                    return;
                }
                try {
                    const resp = await fetch("/api/login/preview?usuario=" + encodeURIComponent(login));
                    const data = await resp.json();
                    nomePreview.textContent = data.nome_exibicao || "";
                } catch (err) {
                    nomePreview.textContent = "";
                }
            }

            campoUsuario.addEventListener("input", function () {
                clearTimeout(timerPreview);
                timerPreview = setTimeout(atualizarNome, 250);
            });

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                definirFeedback("Entrando...", null);
                try {
                    const resp = await fetch("/api/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        credentials: "same-origin",
                        cache: "no-store",
                        body: JSON.stringify({
                            usuario: campoUsuario.value.trim(),
                            senha: campoSenha.value,
                        }),
                    });
                    const data = await resp.json();
                    if (!resp.ok || !data.sucesso) {
                        throw new Error(data.mensagem || "Falha no login");
                    }
                    window.location.replace(proximo);
                } catch (err) {
                    definirFeedback(err.message || "Não foi possível entrar.", "erro");
                    campoSenha.value = "";
                    campoSenha.focus();
                }
            });
        })();
    </script>
</body>
</html>
